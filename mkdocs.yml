site_name: Buku Kolaborasi LLM
site_description: The Local LLM Encyclopedia — Panduan Komprehensif Ekosistem LLM Lokal
site_url: https://bagaswap111.github.io/buku-kolaborasi-llm/
repo_url: https://github.com/bagaswap111/buku-kolaborasi-llm
edit_uri: edit/main/konten/
docs_dir: konten

theme:
  name: material
  icon:
    logo: fontawesome/solid/book
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bagaswap111/buku-kolaborasi-llm
  generator: false

copyright: Copyright &copy; 2026 Buku Kolaborasi LLM

